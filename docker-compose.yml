services:
  bsv-node:
    image: ${BSV_NODE_IMAGE:-bitcoinsv/bitcoin-sv:latest}
    entrypoint: ["/bin/sh", "/workspace/docker/bsv-node/start.sh"]
    environment:
      INITIAL_BLOCK_HEIGHT: ${INITIAL_BLOCK_HEIGHT:-10001}
      MINE_INTERVAL_SECONDS: ${MINE_INTERVAL_SECONDS:-20}
    volumes:
      - ./docker/bsv-node/start.sh:/workspace/docker/bsv-node/start.sh:ro
      - bsv-node-data:/home/bitcoin/.bitcoin
    ports:
      - "18444:18444"
      - "18443:18443"

  bsvms:
    image: ${BSVMS_IMAGE:-ghcr.io/brad1121/bitcoinsv-microservice:latest}
    command:
      - -network=regtest
      - -addr=:50051
      - -connect=true
      - -peers=bsv-node:18444
      - -data-dir=/data
    depends_on:
      bsv-node:
        condition: service_started
        restart: true
    volumes:
      - bsvms-data:/data
    ports:
      - "50051:50051"

  woc-explorer:
    image: ${WOC_EXPLORER_IMAGE:-brad1121/woc-explorer:latest}
    depends_on:
      - bsv-node
    volumes:
      - ./docker/woc-explorer/credentials.js:/workspace/app/credentials.js:ro
    ports:
      - "3002:3002"

  blackjack-fund:
    image: ${BSVMS_IMAGE:-ghcr.io/brad1121/bitcoinsv-microservice:latest}
    entrypoint: ["/usr/local/bin/blackjack"]
    command: ["-fund"]
    environment:
      BSVMS_ADDR: bsvms:50051
      BSVMS_REGTEST_PEER: bsv-node:18444
      BSV_NODE_RPC_URL: http://bsv-node:18443
      BSV_NODE_RPC_USER: bsv
      BSV_NODE_RPC_PASSWORD: bsv
    depends_on:
      bsv-node:
        condition: service_started
      bsvms:
        condition: service_started

  blackjack:
    image: ${BSVMS_IMAGE:-ghcr.io/brad1121/bitcoinsv-microservice:latest}
    profiles: ["game"]
    entrypoint: ["/usr/local/bin/blackjack"]
    environment:
      BSVMS_ADDR: bsvms:50051
      BSVMS_REGTEST_PEER: bsv-node:18444
      WOC_EXPLORER_URL: http://localhost:3002
    depends_on:
      bsvms:
        condition: service_started
      blackjack-fund:
        condition: service_completed_successfully
    stdin_open: true
    tty: true

volumes:
  bsv-node-data:
  bsvms-data:

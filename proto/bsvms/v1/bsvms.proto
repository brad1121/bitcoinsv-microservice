syntax = "proto3";

package bsvms.v1;

option go_package = "github.com/brad1121/bsvms/gen/bsvms/v1;bsvmspb";

service BSVMS {
  rpc Status(StatusRequest) returns (StatusResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (AuthTokens);
  rpc ConnectPeer(ConnectPeerRequest) returns (ConnectPeerResponse);
  rpc ListWallets(ListWalletsRequest) returns (ListWalletsResponse);
  rpc CreateWallet(CreateWalletRequest) returns (CreateWalletResponse);
  rpc RestoreWallet(RestoreWalletRequest) returns (WalletResponse);
  rpc GetWallet(GetWalletRequest) returns (WalletResponse);
  rpc NewAddress(NewAddressRequest) returns (AddressResponse);
  rpc BatchNewAddresses(BatchNewAddressesRequest) returns (BatchNewAddressesResponse);
  rpc DeriveAt(DeriveAtRequest) returns (AddressResponse);
  rpc PubKeyAt(PubKeyAtRequest) returns (PubKeyAtResponse);
  rpc SignHashAt(SignHashAtRequest) returns (SignHashAtResponse);
  rpc NextIndex(NextIndexRequest) returns (NextIndexResponse);
  rpc Balance(BalanceRequest) returns (BalanceResponse);
  rpc ListUTXOs(ListUTXOsRequest) returns (ListUTXOsResponse);
  rpc ImportUTXO(ImportUTXORequest) returns (ImportUTXOResponse);
  rpc ProcessRawTx(ProcessRawTxRequest) returns (ProcessRawTxResponse);
  rpc ClearUTXOs(ClearUTXOsRequest) returns (ClearUTXOsResponse);
  rpc ReloadFromStore(ReloadFromStoreRequest) returns (ReloadFromStoreResponse);
  rpc WipeWallet(WipeWalletRequest) returns (WipeWalletResponse);
  rpc PruneUnknownUTXOs(PruneUnknownUTXOsRequest) returns (PruneUnknownUTXOsResponse);
  rpc IgnoreOutpoint(IgnoreOutpointRequest) returns (IgnoreOutpointResponse);
  rpc IsOutpointIgnored(IsOutpointIgnoredRequest) returns (IsOutpointIgnoredResponse);
  rpc UntrackUTXO(UntrackUTXORequest) returns (UntrackUTXOResponse);
  rpc CanCover(CanCoverRequest) returns (CanCoverResponse);
  rpc Send(SendRequest) returns (SpendResponse);
  rpc SendAll(SendAllRequest) returns (SpendResponse);
  rpc SpendToOutputs(SpendToOutputsRequest) returns (SpendDetailResponse);
  rpc BroadcastCustomSpend(BroadcastCustomSpendRequest) returns (SpendResponse);
  rpc P2PKHOutput(P2PKHOutputRequest) returns (OutputSpec);
  rpc OpReturnOutput(OpReturnOutputRequest) returns (OutputSpec);
  rpc AnyoneCanSpendOutput(AnyoneCanSpendOutputRequest) returns (OutputSpec);
  rpc ParseTransaction(ParseTransactionRequest) returns (Transaction);
  rpc BroadcastRaw(BroadcastRawRequest) returns (BroadcastRawResponse);
  rpc ExecuteScript(ExecuteScriptRequest) returns (ExecuteScriptResponse);
  rpc DecodeOutputAddress(DecodeOutputAddressRequest) returns (DecodeOutputAddressResponse);
  rpc PendingTransactions(PendingTransactionsRequest) returns (PendingTransactionsResponse);
  rpc RebroadcastPendingTransactions(RebroadcastPendingTransactionsRequest) returns (RebroadcastPendingTransactionsResponse);
  rpc StreamTransactions(StreamTransactionsRequest) returns (stream Transaction);
  rpc StreamBlocks(StreamBlocksRequest) returns (stream Block);
  rpc StreamPayments(StreamPaymentsRequest) returns (stream Payment);
  rpc StreamWalletTransactions(StreamWalletTransactionsRequest) returns (stream WalletTransaction);
  rpc StreamP2PTraffic(StreamP2PTrafficRequest) returns (stream P2PTraffic);
  rpc StreamRejects(StreamRejectsRequest) returns (stream Reject);
}

message StatusRequest {}

message StatusResponse {
  string network = 1;
  int32 chain_height = 2;
  int32 best_peer_height = 3;
  int32 peer_count = 4;
  string data_dir = 5;
  map<string, int32> peer_heights = 6;
}

message AuthTokens {
  string access_token = 1;
  string refresh_token = 2;
  string token_type = 3;
  string expires_at = 4;
  string tenant_id = 5;
  string wallet_id = 6;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message ConnectPeerRequest {
  string address = 1;
}

message ConnectPeerResponse {}

message TenantWallet {
  string tenant_id = 1;
  string wallet_id = 2;
}

message Wallet {
  string tenant_id = 1;
  string wallet_id = 2;
  repeated string addresses = 3;
  int64 balance_satoshis = 4;
  double balance_bsv = 5;
  uint32 next_external_index = 6;
  uint32 next_change_index = 7;
  string selector = 8;
}

message ListWalletsRequest {
  string tenant_id = 1;
}

message ListWalletsResponse {
  repeated Wallet wallets = 1;
}

message CreateWalletRequest {
  string tenant_id = 1;
  string wallet_id = 2;
}

message CreateWalletResponse {
  Wallet wallet = 1;
  string mnemonic = 2;
  AuthTokens tokens = 3;
}

message RestoreWalletRequest {
  string tenant_id = 1;
  string wallet_id = 2;
  string mnemonic = 3;
  string passphrase = 4;
}

message WalletResponse {
  Wallet wallet = 1;
  AuthTokens tokens = 2;
}

message GetWalletRequest {
  string tenant_id = 1;
  string wallet_id = 2;
}

message NewAddressRequest {
  string tenant_id = 1;
  string wallet_id = 2;
}

message DerivedAddress {
  string address = 1;
  string path = 2;
  bytes pub_key = 3;
  bytes script = 4;
  uint32 branch = 5;
  uint32 index = 6;
}

message AddressResponse {
  DerivedAddress address = 1;
}

message BatchNewAddressesRequest {
  string tenant_id = 1;
  string wallet_id = 2;
  int32 count = 3;
}

message BatchNewAddressesResponse {
  repeated DerivedAddress addresses = 1;
}

message DeriveAtRequest {
  string tenant_id = 1;
  string wallet_id = 2;
  uint32 branch = 3;
  uint32 index = 4;
}

message PubKeyAtRequest {
  string tenant_id = 1;
  string wallet_id = 2;
  uint32 branch = 3;
  uint32 index = 4;
}

message PubKeyAtResponse {
  bytes pub_key = 1;
  string address = 2;
}

message SignHashAtRequest {
  string tenant_id = 1;
  string wallet_id = 2;
  uint32 branch = 3;
  uint32 index = 4;
  bytes hash = 5;
}

message SignHashAtResponse {
  bytes signature = 1;
  bytes pub_key = 2;
}

message NextIndexRequest {
  string tenant_id = 1;
  string wallet_id = 2;
  uint32 branch = 3;
}

message NextIndexResponse {
  uint32 next_index = 1;
}

message BalanceRequest {
  string tenant_id = 1;
  string wallet_id = 2;
}

message BalanceResponse {
  int64 satoshis = 1;
  double bsv = 2;
}

message UTXO {
  string txid = 1;
  uint32 vout = 2;
  int64 value = 3;
  bytes script = 4;
  int32 height = 5;
}

message ListUTXOsRequest {
  string tenant_id = 1;
  string wallet_id = 2;
}

message ListUTXOsResponse {
  repeated UTXO utxos = 1;
}

message ImportUTXORequest {
  string tenant_id = 1;
  string wallet_id = 2;
  string txid = 3;
  uint32 vout = 4;
  int64 value = 5;
  bytes script = 6;
  int32 height = 7;
  bool force = 8;
}

message ImportUTXOResponse {}

message ProcessRawTxRequest {
  string tenant_id = 1;
  string wallet_id = 2;
  bytes raw_tx = 3;
  int32 height = 4;
}

message ProcessRawTxResponse {}

message ClearUTXOsRequest {
  string tenant_id = 1;
  string wallet_id = 2;
}

message ClearUTXOsResponse {
  int32 cleared = 1;
}

message ReloadFromStoreRequest {
  string tenant_id = 1;
  string wallet_id = 2;
}

message ReloadFromStoreResponse {
  int32 loaded = 1;
}

message WipeWalletRequest {
  string tenant_id = 1;
  string wallet_id = 2;
}

message WipeWalletResponse {
  int32 removed = 1;
}

message PruneUnknownUTXOsRequest {
  string tenant_id = 1;
  string wallet_id = 2;
}

message PruneUnknownUTXOsResponse {
  int32 removed = 1;
}

message IgnoreOutpointRequest {
  string tenant_id = 1;
  string wallet_id = 2;
  string txid = 3;
  uint32 vout = 4;
  bool unignore = 5;
}

message IgnoreOutpointResponse {}

message IsOutpointIgnoredRequest {
  string tenant_id = 1;
  string wallet_id = 2;
  string txid = 3;
  uint32 vout = 4;
}

message IsOutpointIgnoredResponse {
  bool ignored = 1;
}

message UntrackUTXORequest {
  string tenant_id = 1;
  string wallet_id = 2;
  string txid = 3;
  uint32 vout = 4;
}

message UntrackUTXOResponse {
  int64 removed_value = 1;
}

message CanCoverRequest {
  string tenant_id = 1;
  string wallet_id = 2;
  int64 total_out = 3;
  int64 fee_per_byte = 4;
  int32 fixed_outputs = 5;
}

message CanCoverResponse {}

message SendRequest {
  string tenant_id = 1;
  string wallet_id = 2;
  string to_address = 3;
  int64 amount_satoshis = 4;
}

message SendAllRequest {
  string tenant_id = 1;
  string wallet_id = 2;
  string to_address = 3;
  bool detailed = 4;
}

message SpendResponse {
  string txid = 1;
}

message OutputSpec {
  bytes script = 1;
  int64 value = 2;
}

message SpendToOutputsRequest {
  string tenant_id = 1;
  string wallet_id = 2;
  repeated OutputSpec outputs = 3;
  bool ignore_fixed_outputs = 4;
}

message SpendDetail {
  string txid = 1;
  repeated UTXO spent_utxos = 2;
  optional UTXO change_utxo = 3;
  bytes raw_tx = 4;
}

message SpendDetailResponse {
  SpendDetail detail = 1;
}

message CustomInput {
  string txid = 1;
  uint32 vout = 2;
  bytes script_sig = 3;
  uint32 sequence = 4;
}

message BroadcastCustomSpendRequest {
  repeated CustomInput inputs = 1;
  repeated OutputSpec outputs = 2;
}

message P2PKHOutputRequest {
  string address = 1;
  int64 value = 2;
}

message OpReturnOutputRequest {
  bytes data = 1;
}

message AnyoneCanSpendOutputRequest {
  int64 value = 1;
}

message ParseTransactionRequest {
  bytes raw_tx = 1;
}

message Transaction {
  string txid = 1;
  bytes raw_tx = 2;
  repeated TxInput inputs = 3;
  repeated TxOutput outputs = 4;
}

message TxInput {
  string prev_txid = 1;
  uint32 prev_vout = 2;
  bytes script_sig = 3;
  bool coinbase = 4;
  string sender_address = 5;
}

message TxOutput {
  uint32 vout = 1;
  int64 value = 2;
  bytes script = 3;
  string address = 4;
}

message BroadcastRawRequest {
  bytes raw_tx = 1;
}

message BroadcastRawResponse {
  string txid = 1;
}

message ExecuteScriptRequest {
  bytes script_sig = 1;
  bytes script_pub_key = 2;
  bytes raw_tx = 3;
  int32 input_index = 4;
  int64 amount = 5;
}

message ExecuteScriptResponse {
  bool ok = 1;
  string error = 2;
}

message DecodeOutputAddressRequest {
  bytes script_pub_key = 1;
}

message DecodeOutputAddressResponse {
  string address = 1;
  bool ok = 2;
}

message PendingTransactionsRequest {}

message PendingTransaction {
  string txid = 1;
  string first_broadcast = 2;
  string last_broadcast = 3;
  string last_announce = 4;
  int32 rebroadcasts = 5;
}

message PendingTransactionsResponse {
  repeated PendingTransaction transactions = 1;
}

message RebroadcastPendingTransactionsRequest {}

message RebroadcastPendingTransactionsResponse {
  int32 count = 1;
}

message StreamTransactionsRequest {}

message Block {
  string hash = 1;
  int32 height = 2;
  repeated string txids = 3;
  repeated BlockSpend spends = 4;
}

message BlockSpend {
  string prev_txid = 1;
  uint32 prev_vout = 2;
  string spending_txid = 3;
}

message StreamBlocksRequest {}

message Payment {
  string tenant_id = 1;
  string wallet_id = 2;
  string txid = 3;
  int64 amount = 4;
  string address = 5;
  uint32 vout = 6;
  bytes script = 7;
}

message StreamPaymentsRequest {
  string tenant_id = 1;
  string wallet_id = 2;
}

message OwnedOutput {
  uint32 vout = 1;
  int64 value = 2;
  bytes script = 3;
  string address = 4;
}

message SpentOutPoint {
  string txid = 1;
  uint32 vout = 2;
}

message WalletTransaction {
  string tenant_id = 1;
  string wallet_id = 2;
  Transaction transaction = 3;
  repeated OwnedOutput owned = 4;
  repeated SpentOutPoint spent = 5;
}

message StreamWalletTransactionsRequest {
  string tenant_id = 1;
  string wallet_id = 2;
}

message P2PTraffic {
  string peer = 1;
  string direction = 2;
  string command = 3;
  int32 payload_bytes = 4;
  string summary = 5;
}

message StreamP2PTrafficRequest {}

message Reject {
  string peer = 1;
  string command = 2;
  uint32 code = 3;
  string code_name = 4;
  string reason = 5;
  string hash = 6;
}

message StreamRejectsRequest {}
